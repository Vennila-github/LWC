<template>
    <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <button class="slds-button slds-button_icon slds-modal__close">
                <svg class="slds-button__icon slds-button__icon_large" aria-hidden="true">
                    <use xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#close"></use>
                </svg>
                <span class="slds-assistive-text">Cancel and close</span>
            </button>
            <div class="slds-modal__header">
                <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">Modal header</h1>
            </div>
            <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                <p>
                    <template for:each={images} for:item="img">
                        <div key={img.id} style="display:inline-block; text-align:center; margin-right:15px;">
                            <img 
                                src={img.sr} 
                                alt={img.alt} 
                                style="width:120px; height:auto; display:block; margin-bottom:8px;" 
                            />
                            <!-- Checkbox BELOW the image -->
                            <lightning-input 
                                type="checkbox" 
                                label={img.alt}
                                data-id={img.id}
                                onchange={handleCheckboxChange}>
                            </lightning-input>
                        </div>
                    </template>
                </p>
            </div>
            <div class="slds-modal__footer">
                <button class="slds-button slds-button_neutral" aria-label="Close" onclick={handleCancel}>Cancel</button>
            </div>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
</template>
