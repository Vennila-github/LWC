    <lightning-card title = "TemplateLoopingWithObjectArray">
        <div class = "slds-p-around-medium">
            <!-- <template for:each={students} for:item="singleStudentObj"> -->

                <!-- <div key={singleStudentObj.Rollno}> -->

                    {currentIndex}<br>

            </template>
        </div>
    </lightning-card>
</template>
