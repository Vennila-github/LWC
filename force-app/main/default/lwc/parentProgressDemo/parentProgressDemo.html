<template>
    <lightning-card title="Parent Progress Demo">
        <div class="slds-var-m-around_medium">
            <div class="slds-grid">
            <lightning-button class="slds-col" 
            label="Start" 
            variant="success" 
            onclick={handleStart}></lightning-button>
            <lightning-button class="slds-col" 
            label="Stop" 
            variant="destructive" 
            onclick={handleStop}></lightning-button>
            <lightning-button class="slds-col" 
            label="Reset" 
            variant="brand"            
            onclick={handleReset}></lightning-button>
            <!-- Refer the child progress demo -->
            <c-child-progress-demo lwc:ref="child"></c-child-progress-demo>
            </div>
        </div>
    </lightning-card>
</template>
