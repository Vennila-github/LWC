<template>
    <lightning-card title="CreateRecordDemo">
        <div class="slds-p-around_medium">
            <lightning-input 
                name="accName"
                label="Enter Account Name" 
                value={accName} 
                onchange={handleChange}
            ></lightning-input>
            <lightning-input 
                name="annualRevenue"
                label="Annual Revenue" 
                value={annualRevenue} 
                onchange={handleChange}
            ></lightning-input>
            <lightning-button 
              name="Create"
              label="Create" 
              onclick={handleCreate} 
            ></lightning-button>
        </div>
    </lightning-card>
</template>
